<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura RAG - PDF AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --surface-color: rgba(30, 41, 59, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: all 0.25s ease;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.15), transparent 50%),
                              radial-gradient(circle at 10% 80%, rgba(16, 185, 129, 0.08), transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5),
                        0 0 40px var(--accent-glow);
        }

        header {
            text-align: center;
            margin-bottom: 28px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #6366f1, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        p.subtitle {
            font-size: 15px;
            font-weight: 300;
            color: var(--text-muted);
        }

        .config-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media(max-width: 768px) {
            .config-card {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.75);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        input[type="file"]::file-selector-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-right: 12px;
            transition: 0.2s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #4f46e5;
        }

        .upload-btn-container {
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-upload {
            background-color: var(--success-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-upload:hover {
            background-color: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .btn-upload:disabled {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .chat-section {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-display {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-height: 260px;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        .message.you {
            align-self: flex-end;
        }

        .message.aura {
            align-self: flex-start;
        }

        .msg-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .message.you .msg-label {
            align-self: flex-end;
            color: var(--accent-color);
        }

        .message.aura .msg-label {
            color: var(--success-color);
        }

        .msg-content {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.you .msg-content {
            background: linear-gradient(to right bottom, var(--accent-color), #4f46e5);
            color: #ffffff;
            border-top-right-radius: 2px;
        }

        .message.aura .msg-content {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-top-left-radius: 2px;
        }

        .input-bar {
            display: flex;
            gap: 12px;
        }

        .input-bar input[type="text"] {
            flex: 1;
        }

        .btn-ask {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-ask:hover {
            background-color: #4f46e5;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .btn-ask:disabled {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-bar {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AURA RAG</h1>
        <p class="subtitle">Secure, fast, and local document reasoning</p>
    </header>

    <div class="config-card">
        <div class="form-group">
            <label for="groq-key">Groq API Key</label>
            <input type="text" id="groq-key" placeholder="Paste your API key here...">
        </div>

        <div class="form-group">
            <label for="pdf-file">Upload PDF Document</label>
            <div class="upload-btn-container">
                <input type="file" id="pdf-file" accept=".pdf">
                <button id="btn-upload" class="btn-upload" onclick="uploadPDF()">Upload</button>
            </div>
        </div>
    </div>

    <div class="chat-section">
        <div class="chat-display" id="chat-box">
            <div class="message aura">
                <span class="msg-label">Aura</span>
                <span class="msg-content">Hello! Please upload a PDF and enter your Groq API key to start querying.</span>
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="user-query" placeholder="Ask a question about the document..." onkeypress="handleKey(event)">
            <button id="btn-ask" class="btn-ask" onclick="askQuestion()">Ask</button>
        </div>

        <div class="status-bar">
            <span id="status-text">Ready</span>
            <span id="file-indicator">No PDF file loaded</span>
        </div>
    </div>
</div>

<script>
    let fileId = null;

    // Load default key from URL or localStorage if any
    const localKey = localStorage.getItem('GROQ_API_KEY') || '';
    if (localKey) {
        document.getElementById('groq-key').value = localKey;
    }

    function updateStatus(text, type = 'normal') {
        const el = document.getElementById('status-text');
        el.innerText = text;
        if (type === 'error') {
            el.style.color = '#ef4444';
        } else if (type === 'success') {
            el.style.color = '#10b981';
        } else {
            el.style.color = '#94a3b8';
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter') {
            askQuestion();
        }
    }

    async function uploadPDF() {
        const fileInput = document.getElementById('pdf-file');
        const uploadBtn = document.getElementById('btn-upload');
        if (!fileInput.files || fileInput.files.length === 0) {
            alert('Please select a PDF file.');
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('file', file);

        uploadBtn.disabled = true;
        updateStatus(`Uploading and parsing ${file.name}...`);

        try {
            const response = await fetch('/api/upload-pdf', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.detail || 'Upload failed');
            }

            fileId = result.file_id;
            updateStatus('PDF successfully loaded and indexed!', 'success');
            document.getElementById('file-indicator').innerText = `File: ${result.filename}`;
            document.getElementById('file-indicator').style.color = '#10b981';

            // Store API Key securely
            const apiKey = document.getElementById('groq-key').value.trim();
            if (apiKey) localStorage.setItem('GROQ_API_KEY', apiKey);

        } catch (err) {
            updateStatus(`Error: ${err.message}`, 'error');
            alert(`Error uploading file: ${err.message}`);
        } finally {
            uploadBtn.disabled = false;
        }
    }

    async function askQuestion() {
        const queryInput = document.getElementById('user-query');
        const askBtn = document.getElementById('btn-ask');
        const chatBox = document.getElementById('chat-box');
        const query = queryInput.value.trim();

        if (!query) return;

        const apiKey = document.getElementById('groq-key').value.trim();
        if (!apiKey) {
            alert('Please enter your Groq API Key.');
            document.getElementById('groq-key').focus();
            return;
        }

        if (!fileId) {
            alert('Please upload a PDF file first.');
            return;
        }

        // Add user message to display
        appendMessage('You', query);
        queryInput.value = '';
        askBtn.disabled = true;
        updateStatus('Consulting Groq API...');

        try {
            const response = await fetch('/api/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query: query,
                    file_id: fileId,
                    api_key: apiKey
                })
            });

            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.detail || 'Query failed');
            }

            appendMessage('Aura', result.answer);
            updateStatus('Ready');

        } catch (err) {
            updateStatus(`Error: ${err.message}`, 'error');
            appendMessage('Aura', `Failed to generate answer. Error: ${err.message}`);
        } finally {
            askBtn.disabled = false;
        }
    }

    function appendMessage(speaker, text) {
        const chatBox = document.getElementById('chat-box');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${speaker.toLowerCase()}`;

        const labelSpan = document.createElement('span');
        labelSpan.className = 'msg-label';
        labelSpan.innerText = speaker;

        const contentSpan = document.createElement('span');
        contentSpan.className = 'msg-content';
        contentSpan.innerText = text;

        messageDiv.appendChild(labelSpan);
        messageDiv.appendChild(contentSpan);

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
